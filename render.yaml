services:
  - type: web
    name: devarise-web
    env: node
    plan: starter
    repo: "https://github.com/sameerrswami/DevArise"
    branch: main
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEYS
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_INTERVIEW_QUESTION_COUNT
        value: "10"
      - key: NEXT_PUBLIC_INFORMATION
        value: "Interview instructions shown on the dashboard interview page"
      - key: NEXT_PUBLIC_QUESTION_NOTE
        value: "Question note shown in the interview start screen"
    healthCheckPath: /api/health
    autoDeploy: true
